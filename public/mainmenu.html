<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Главное меню - Общежитие №6</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header class="topbar">
        <h1>Главное меню</h1>
        <div class="actions">
            <button id="logoutBtn" class="btn">Выйти</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tabBtn active" data-tab="announcements">Объявления</button>
        <button class="tabBtn" data-tab="laundry">Стирка</button>
        <button class="tabBtn" data-tab="shifts">Ремонт</button>
        <button class="tabBtn" data-tab="events">Мероприятия</button>
    </nav>

    <main class="mainmenu-content">
        <section id="announcements" class="tab active"></section>
        <section id="laundry" class="tab hidden"></section>
        <section id="shifts" class="tab hidden">
            <div class="specialist-filter">
                <label for="specialist-select">🔧 Специалист:</label>
                <select id="specialist-select" class="form-select">
                    <option value="plumber">Сантехник</option>
                    <option value="electrician">Электрик</option>
                    <option value="carpenter">Плотник</option>
                </select>
            </div>

            <div id="calendar-content"></div>
        </section>
        <section id="events" class="tab hidden"></section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/mainmenu.js"></script>
</body>

</html>
