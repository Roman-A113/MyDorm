<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход / Регистрация - Общежитие №6</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <main class="auth-page">
        <div class="auth-card">
            <h2>Регистрация</h2>
            <form id="registerForm">
                <label>ФИО<input type="text" name="name" required /></label>
                <label>Почта<input type="email" name="email" required /></label>
                <label>Пароль<input type="password" name="password" required minlength="6" /></label>
                <label>Роль<select name="role" required>
                        <option value="student">Студент</option>
                        <option value="worker">Работник</option>
                        <option value="admin">Администратор</option>
                    </select></label>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/registration.js"></script>
</body>

</html>
